<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>私のおすすめの休日の過ごし方</title>
	<link rel="stylesheet" href="assets/css/uaplus.css">
	<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="l-header">
	<div class="l-header__inner">
		<div class="l-header__logo"><a href="index.html"><img src="assets/images/logo.png" alt=""></a></div>
		<nav id="gnav">
			<ul>
				<li><a href="index.html">ホーム</a></li>
				<li><a href="about.html">メディアについて</a></li>
				<li><a href="form.html">カタログ請求</a></li>
				<li><a href="contact.html">お問い合わせ</a></li>
			</ul>
		</nav>
	</div>
</header>
<main>
	<article>
		<section>
			<h1>カタログ請求フォーム</h1>
			<div id="errorMessage"></div>
			<form action="" name="requestForm" id="form">
				<p class="notice"><span class="required">*</span> 印は必須項目です</p>
				<table>
					<tr>
						<th><label>お名前</label><span class="required">*</span></th>
						<td><input type="text" name="fullname" value=""></td>
					</tr>
					<tr>
						<th><label>郵便番号</label><span class="required">*</span></th>
						<td><input type="text" name="zip" value="" placeholder="入力例：123-4567"></td>
					</tr>
					<tr>
						<th><label>都道府県</label><span class="required">*</span></th>
						<td>
							<select name="pref" id="pref">
								<option value="">選択してください</option>
								<option value="北海道">北海道</option>
								<option value="青森県">青森県</option>
								<option value="岩手県">岩手県</option>
								<option value="宮城県">宮城県</option>
								<option value="秋田県">秋田県</option>
								<option value="山形県">山形県</option>
								<option value="福島県">福島県</option>
								<option value="茨城県">茨城県</option>
								<option value="栃木県">栃木県</option>
								<option value="群馬県">群馬県</option>
								<option value="埼玉県">埼玉県</option>
								<option value="千葉県">千葉県</option>
								<option value="東京都">東京都</option>
								<option value="神奈川県">神奈川県</option>
								<option value="新潟県">新潟県</option>
								<option value="富山県">富山県</option>
								<option value="石川県">石川県</option>
								<option value="福井県">福井県</option>
								<option value="山梨県">山梨県</option>
								<option value="長野県">長野県</option>
								<option value="岐阜県">岐阜県</option>
								<option value="静岡県">静岡県</option>
								<option value="愛知県">愛知県</option>
								<option value="三重県">三重県</option>
								<option value="滋賀県">滋賀県</option>
								<option value="京都府">京都府</option>
								<option value="大阪府">大阪府</option>
								<option value="兵庫県">兵庫県</option>
								<option value="奈良県">奈良県</option>
								<option value="和歌山県">和歌山県</option>
								<option value="鳥取県">鳥取県</option>
								<option value="島根県">島根県</option>
								<option value="岡山県">岡山県</option>
								<option value="広島県">広島県</option>
								<option value="山口県">山口県</option>
								<option value="徳島県">徳島県</option>
								<option value="香川県">香川県</option>
								<option value="愛媛県">愛媛県</option>
								<option value="高知県">高知県</option>
								<option value="福岡県">福岡県</option>
								<option value="佐賀県">佐賀県</option>
								<option value="長崎県">長崎県</option>
								<option value="熊本県">熊本県</option>
								<option value="大分県">大分県</option>
								<option value="宮崎県">宮崎県</option>
								<option value="鹿児島県">鹿児島県</option>
								<option value="沖縄県">沖縄県</option>
							</select>
						</td>
					</tr>
					<tr>
						<th><label>住所</label><span class="required">*</span></th>
						<td><input type="text" name="address1" value="" placeholder="入力例：中央区日本橋1-2-3"></td>
					</tr>
					<tr>
						<th><label>マンション、アパート</label></th>
						<td><input type="text" name="address2" value="" placeholder="入力例：日本橋マンション102"></td>
					</tr>
					<tr>
						<th><label>電話番号</label><span class="required">*</span></th>
						<td><input type="text" name="tel" value="" placeholder="入力例：03-1234-5678"></td>
					</tr>
				</table>
				<h3>アンケートにお答えください</h3>
				<table>
					<tr>
						<th><label>このサイトをどこで知りましたか？<br>（複数回答可）</label></th>
						<td>
							<label><input type="checkbox" name="fromto" value="SNS">SNS</label>
							<label><input type="checkbox" name="fromto" value="ウェブ検索">ウェブ検索</label>
							<label><input type="checkbox" name="fromto" value="AIのサジェスト">AIのサジェスト</label>
							<label><input type="checkbox" name="fromto" value="チラシ">チラシ</label>
							<label><input type="checkbox" name="fromto" value="友人・知人から">友人・知人から</label>
						</td>
					</tr>
				</table>
				<div style="text-align: center;">
					<p><input type="checkbox" name="accept" id="accept"> <a href="#">プライバシーポリシー</a>に同意します</p>
					<p><input type="button" value="送信する" id="sendButton"></p>

				</div>
			</form>
		</section>
	</article>
</main>

</html>
